<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>EduCore - Complete Your Profile</title>
  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="/responsive.css">
</head>
<body>

  <div class="container">
    <div class="box">
      <h1>Welcome to EduCore!</h1>
      <p class="subtitle">Please complete your profile to continue</p>

      <div id="studentForm">
        <label>Select Faculty</label>
        <select id="faculty">
          <option value="">Select Faculty</option>
        </select>

        <label>Select Department</label>
        <select id="department" disabled>
          <option value="">Select Department first</option>
        </select>

        <label>Select Course</label>
        <select id="course" disabled>
          <option value="">Select Department first</option>
        </select>

    <button id="saveBtn">Save & Continue</button>
      </div>

      <div id="admissionBox" class="admission-box hidden">
        <h3>🎉 Profile Complete!</h3>
        <p>Your admission number is:</p>
        <div class="admission-number" id="admissionNumberDisplay"></div>
        <p class="admission-note">
          <strong>Important:</strong> Please save this number — you'll use it to log in from now on.
        </p>
        <button id="continueBtn">Continue to Dashboard</button>
      </div>

      <div id="lecturerForm" style="display:none">
        <label>Select Faculty</label>
        <select id="lecturerFaculty">
          <option value="">Select Faculty</option>
        </select>

        <label>Select Department</label>
        <select id="lecturerDept" disabled>
          <option value="">Select Faculty first</option>
        </select>

        <button id="saveLecturerBtn">Save & Continue</button>
      </div>

      <p class="message" id="message"></p>
    </div>
  </div>

</body>
<script src="script.js"></script>
</html>
