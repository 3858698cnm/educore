<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>EduCore - Student Dashboard</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="sidebar">
    <h2>EduCore</h2>
    <nav>
      <a href="/student/dashboard" class="active">Dashboard</a>
      <a href="/student/live-class">Live Class</a>
      <a href="/student/grades">Grades</a>
      <a href="/student/materials">Materials</a>
      <a href="/student/attendance">My Attendance</a>
    </nav>
    <button id="logoutBtn">Logout</button>
  </div>

  <div class="main">
    <header>
      <h1>Welcome, <span id="studentName">Student</span></h1>
      <p id="studentCourse">Loading your course info...</p>
    </header>

    <!-- LIVE CLASSES SECTION -->
    <div class="section">
      <h2>🔴 Live Classes Right Now</h2>
      <div id="liveClassList" class="live-list">
        <p class="empty-text">No live classes at the moment.</p>
      </div>
    </div>

    <!-- MY UNITS SECTION -->
    <div class="section">
      <h2>📚 My Units</h2>
      <div id="unitsList" class="units-list">
        <p class="empty-text">Loading units...</p>
      </div>
    </div>

    <!-- STATS SECTION -->
    <div class="cards">
      <div class="card">
        <h3 id="totalUnits">0</h3>
        <p>Total Units</p>
      </div>
      <div class="card">
        <h3 id="attendanceRate">0%</h3>
        <p>Attendance Rate</p>
      </div>
      <div class="card">
        <h3 id="totalGrades">0</h3>
        <p>Graded Units</p>
      </div>
    </div>
  </div>

</body>
<script src="script.js"></script>
</html>
