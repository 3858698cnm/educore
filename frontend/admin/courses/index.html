<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>EduCore - Courses</title>
  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="/responsive.css">
</head>
<body>

  <div class="sidebar">
    <h2>EduCore</h2>
    <nav>
      <a href="/admin/dashboard">Dashboard</a>
      <a href="/admin/approvals">Approvals</a>
      <a href="/admin/students">Students</a>
      <a href="/admin/lecturers">Lecturers</a>
      <a href="/admin/faculties">Faculties</a>
      <a href="/admin/departments">Departments</a>
      <a href="/admin/courses" class="active">Courses</a>
      <a href="/admin/units">Units</a>
    </nav>
    <button id="logoutBtn">Logout</button>
  </div>

  <div class="main">
    <header>
      <h1>Courses</h1>
      <p>Manage all courses (programmes) in the system</p>
    </header>

    <div class="add-box">
      <h3>Add New Course</h3>
      <div class="form-row">
        <select id="courseFaculty">
          <option value="">Select Faculty</option>
        </select>
        <select id="courseDept" disabled>
          <option value="">Select Department</option>
        </select>
      </div>
    <div class="form-row">
        <input type="text" id="courseName" placeholder="Course Name (e.g. Bachelor of Computer Science)">
        <input type="text" id="courseCode" placeholder="Code (e.g. COM)" maxlength="6" style="text-transform: uppercase; max-width: 120px;">
        <button id="addBtn">Add Course</button>
      </div>
      <p class="message" id="message"></p>
    </div>
<table>
      <thead>
        <tr>
          <th>Course Name</th>
          <th>Code</th>
          <th>Department</th>
          <th>Faculty</th>
          <th>Actions</th>
        </tr>
      </thead>
 
      <tbody id="courseTableBody"></tbody>
    </table>
  </div>

</body>
<script src="script.js"></script>
</html>
