<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>EduCore - Login</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="container">
    <h1>Welcome Back</h1>
    <p class="subtitle">Login to EduCore</p>

    <form id="loginForm">
      <label>Email</label>
      <input type="email" id="email" placeholder="Enter your email" required>

      <label>Password</label>
<div class="password-wrapper">
  <input type="password" id="password" placeholder="Password" required>
  <span id="togglePassword" class="toggle-eye">
    <svg id="eyeIcon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
      <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path>
      <circle cx="12" cy="12" r="3"></circle>
    </svg>
  </span>
</div>

    <button type="submit">Login</button>
    </form>

    <p class="message" id="message"></p>

    <p class="forgot"><a href="#" id="forgotLink">Forgot Password?</a></p>

    <p class="switch">Don't have an account? <a href="/register">Register here</a></p>

   <!-- FORGOT PASSWORD BOX (hidden by default) -->
    <div id="forgotBox" class="forgot-box hidden">
      <h3>Reset Password</h3>

      <!-- STEP 1: Request code -->
      <div id="requestCodeStep">
        <label>Enter your email</label>
        <input type="email" id="resetEmail" placeholder="Enter your registered email">
        <button id="requestCodeBtn">Send Reset Code</button>
      </div>

      <!-- STEP 2: Enter code + new password (hidden until code is requested) -->
      <div id="enterCodeStep" class="hidden">
        <label>Enter 6-digit code</label>
        <input type="text" id="resetCode" placeholder="Enter code from email" maxlength="6">
        <label>New Password</label>
        <input type="password" id="newPassword" placeholder="Enter new password">
        <label>Confirm New Password</label>
        <input type="password" id="confirmPassword" placeholder="Confirm new password">
        <button id="resetBtn">Reset Password</button>
      </div>

      <p class="message" id="resetMessage"></p>
    </div>
  </div>

</body>
<script src="script.js"></script>
</html>
